services:
  postgres:
    image: postgres:18-alpine
    container_name: conduit-postgres
    environment:
      POSTGRES_DB:       conduit
      POSTGRES_USER:     conduit
      POSTGRES_PASSWORD: conduit_secret
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U conduit -d conduit"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
    name: conduit-postgres
