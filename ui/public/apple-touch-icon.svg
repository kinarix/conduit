<!-- icon-180.svg — 180×180 Apple touch icon; reuses 128 design at larger size -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="180" height="180">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#0d1b2e"/>
      <stop offset="100%" stop-color="#020917"/>
    </radialGradient>
    <linearGradient id="pipe" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#4e6070"/>
      <stop offset="18%"  stop-color="#3a4f63"/>
      <stop offset="50%"  stop-color="#243347"/>
      <stop offset="82%"  stop-color="#1a2533"/>
