      <stop offset="100%" stop-color="#060f1a"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="ambient"><feGaussianBlur stdDeviation="7"/></filter>
  </defs>
