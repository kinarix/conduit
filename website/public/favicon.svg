<!-- favicon.svg — renders at 16×16 and 32×32; minimal detail -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#0d1b2e"/>
      <stop offset="100%" stop-color="#020917"/>
    </radialGradient>
    <filter id="g">
      <feGaussianBlur stdDeviation="1.2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="32" height="32" rx="6" fill="url(#bg)"/>
  <!-- 3 pipes -->
  <rect x="4"  y="6.5"  width="24" height="5" rx="2.5" fill="#2a3f55"/>
  <rect x="4"  y="13.5" width="24" height="5" rx="2.5" fill="#2a3f55"/>
  <rect x="4"  y="20.5" width="24" height="5" rx="2.5" fill="#2a3f55"/>
  <!-- highlight stripe -->
  <rect x="6"  y="7"    width="20" height="1.5" rx="0.75" fill="#5a7a96" opacity="0.5"/>
  <rect x="6"  y="14"   width="20" height="1.5" rx="0.75" fill="#5a7a96" opacity="0.5"/>
  <rect x="6"  y="21"   width="20" height="1.5" rx="0.75" fill="#5a7a96" opacity="0.5"/>
  <!-- tokens -->
  <circle cx="13" cy="9"    r="2.8" fill="#6366f1" filter="url(#g)"/>
  <circle cx="13" cy="9"    r="1.3" fill="#c7d2fe"/>
  <circle cx="17" cy="16"   r="2.8" fill="#22d3ee" filter="url(#g)"/>
  <circle cx="17" cy="16"   r="1.3" fill="#e0f9ff"/>
  <circle cx="11" cy="23"   r="2.8" fill="#a78bfa" filter="url(#g)"/>
  <circle cx="11" cy="23"   r="1.3" fill="#ede9fe"/>
</svg>
