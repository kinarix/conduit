<!-- og-image.svg — 1200×630 Open Graph / social preview -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <radialGradient id="bg" cx="30%" cy="50%" r="80%">
      <stop offset="0%" stop-color="#0d1b2e"/>
      <stop offset="100%" stop-color="#020917"/>
    </radialGradient>
    <linearGradient id="pipe" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#4e6070"/>
      <stop offset="18%"  stop-color="#3a4f63"/>
      <stop offset="50%"  stop-color="#243347"/>
      <stop offset="82%"  stop-color="#1a2533"/>
      <stop offset="100%" stop-color="#0f1a28"/>
    </linearGradient>
    <radialGradient id="cap" cx="50%" cy="35%" r="65%">
      <stop offset="0%"   stop-color="#1e3a5f"/>
      <stop offset="60%"  stop-color="#0d2035"/>
      <stop offset="100%" stop-color="#060f1a"/>
    </radialGradient>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="ambient" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
    <filter id="textglow" x="-20%" y="-60%" width="140%" height="220%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="trail1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="white" stop-opacity="0"/>
      <stop offset="100%" stop-color="white" stop-opacity="0.5"/>
    </linearGradient>
    <linearGradient id="trail2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="white" stop-opacity="0"/>
      <stop offset="100%" stop-color="white" stop-opacity="0.45"/>
    </linearGradient>
    <linearGradient id="trail3" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="white" stop-opacity="0"/>
      <stop offset="100%" stop-color="white" stop-opacity="0.45"/>
    </linearGradient>
    <mask id="m1"><rect x="80" y="203" width="130" height="26" rx="4" fill="url(#trail1)"/></mask>
    <mask id="m2"><rect x="130" y="299" width="140" height="26" rx="4" fill="url(#trail2)"/></mask>
    <mask id="m3"><rect x="74" y="393" width="108" height="26" rx="4" fill="url(#trail3)"/></mask>
    <!-- divider gradient -->
    <linearGradient id="div" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3a5068" stop-opacity="0"/>
      <stop offset="30%" stop-color="#3a5068"/>
      <stop offset="70%" stop-color="#3a5068"/>
      <stop offset="100%" stop-color="#3a5068" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="wordmark" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e2e8f0"/>
      <stop offset="100%" stop-color="#94a3b8"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Ambient left glow -->
  <ellipse cx="256" cy="315" rx="280" ry="200" fill="#1a3a6e" filter="url(#ambient)" opacity="0.25"/>
  <!-- Ambient right glow -->
  <ellipse cx="820" cy="280" rx="180" ry="100" fill="#4338ca" filter="url(#ambient)" opacity="0.08"/>

  <!-- ═══ ICON — left side, vertically centred ═══════════════════════════ -->
  <!-- Pipe 1 -->
  <rect x="72"  y="190" width="380" height="54" rx="27" fill="url(#pipe)"/>
  <rect x="100" y="194" width="324" height="8"  rx="4"  fill="#7a9ab5" opacity="0.35"/>
  <rect x="100" y="236" width="324" height="4"  rx="2"  fill="#000" opacity="0.25"/>
  <!-- Pipe 2 -->
  <rect x="72"  y="288" width="380" height="54" rx="27" fill="url(#pipe)"/>
  <rect x="100" y="292" width="324" height="8"  rx="4"  fill="#7a9ab5" opacity="0.35"/>
  <rect x="100" y="334" width="324" height="4"  rx="2"  fill="#000" opacity="0.25"/>
  <!-- Pipe 3 -->
  <rect x="72"  y="386" width="380" height="54" rx="27" fill="url(#pipe)"/>
  <rect x="100" y="390" width="324" height="8"  rx="4"  fill="#7a9ab5" opacity="0.35"/>
  <rect x="100" y="432" width="324" height="4"  rx="2"  fill="#000" opacity="0.25"/>

  <!-- Left caps -->
  <ellipse cx="72" cy="217" rx="27" ry="27" fill="url(#cap)" stroke="#3a5068" stroke-width="2.5"/>
  <ellipse cx="72" cy="217" rx="15" ry="15" fill="#0a1a2e" opacity="0.8"/>
  <ellipse cx="72" cy="315" rx="27" ry="27" fill="url(#cap)" stroke="#3a5068" stroke-width="2.5"/>
  <ellipse cx="72" cy="315" rx="15" ry="15" fill="#0a1a2e" opacity="0.8"/>
  <ellipse cx="72" cy="413" rx="27" ry="27" fill="url(#cap)" stroke="#3a5068" stroke-width="2.5"/>
  <ellipse cx="72" cy="413" rx="15" ry="15" fill="#0a1a2e" opacity="0.8"/>
  <!-- Right caps -->
  <ellipse cx="452" cy="217" rx="27" ry="27" fill="url(#cap)" stroke="#3a5068" stroke-width="2.5"/>
  <ellipse cx="452" cy="217" rx="15" ry="15" fill="#0a1a2e" opacity="0.8"/>
  <ellipse cx="452" cy="315" rx="27" ry="27" fill="url(#cap)" stroke="#3a5068" stroke-width="2.5"/>
  <ellipse cx="452" cy="315" rx="15" ry="15" fill="#0a1a2e" opacity="0.8"/>
  <ellipse cx="452" cy="413" rx="27" ry="27" fill="url(#cap)" stroke="#3a5068" stroke-width="2.5"/>
  <ellipse cx="452" cy="413" rx="15" ry="15" fill="#0a1a2e" opacity="0.8"/>

  <!-- Pipe 1 tokens -->
  <ellipse cx="222" cy="217" rx="30" ry="14" fill="#6366f1" filter="url(#ambient)" opacity="0.9"/>
  <rect x="80" y="207" width="136" height="18" rx="9" fill="#6366f1" mask="url(#m1)" opacity="0.4"/>
  <circle cx="155" cy="217" r="6"  fill="#6366f1" opacity="0.45"/>
  <circle cx="222" cy="217" r="17" fill="#6366f1" filter="url(#glow)"/>
  <circle cx="222" cy="217" r="8"  fill="#c7d2fe"/>
  <circle cx="370" cy="217" r="11" fill="#22d3ee" filter="url(#glow)"/>
  <circle cx="370" cy="217" r="5"  fill="#e0f9ff"/>
  <circle cx="422" cy="217" r="6"  fill="#22d3ee" opacity="0.3"/>
  <!-- Pipe 2 tokens -->
  <ellipse cx="284" cy="315" rx="30" ry="14" fill="#22d3ee" filter="url(#ambient)" opacity="0.9"/>
  <rect x="130" y="305" width="140" height="18" rx="9" fill="#22d3ee" mask="url(#m2)" opacity="0.4"/>
  <circle cx="210" cy="315" r="6"  fill="#22d3ee" opacity="0.45"/>
  <circle cx="110" cy="315" r="5"  fill="#22d3ee" opacity="0.2"/>
  <circle cx="284" cy="315" r="17" fill="#22d3ee" filter="url(#glow)"/>
  <circle cx="284" cy="315" r="8"  fill="#e0f9ff"/>
  <circle cx="410" cy="315" r="11" fill="#6366f1" filter="url(#glow)"/>
  <circle cx="410" cy="315" r="5"  fill="#c7d2fe"/>
  <!-- Pipe 3 tokens -->
  <ellipse cx="186" cy="413" rx="26" ry="13" fill="#a78bfa" filter="url(#ambient)" opacity="0.85"/>
  <rect x="74" y="403" width="108" height="18" rx="9" fill="#a78bfa" mask="url(#m3)" opacity="0.4"/>
  <circle cx="136" cy="413" r="6"  fill="#a78bfa" opacity="0.4"/>
  <circle cx="186" cy="413" r="13" fill="#a78bfa" filter="url(#glow)"/>
  <circle cx="186" cy="413" r="6"  fill="#ede9fe"/>
  <circle cx="334" cy="413" r="17" fill="#6366f1" filter="url(#glow)"/>
  <circle cx="334" cy="413" r="8"  fill="#c7d2fe"/>
  <circle cx="422" cy="413" r="6"  fill="#6366f1" opacity="0.35"/>

  <!-- ═══ DIVIDER ════════════════════════════════════════════════════════ -->
  <rect x="560" y="0" width="1" height="630" fill="url(#div)"/>

  <!-- ═══ WORDMARK — right side ══════════════════════════════════════════ -->
  <text
    x="620" y="280"
    font-family="system-ui, -apple-system, 'Segoe UI', sans-serif"
    font-size="96"
    font-weight="700"
    letter-spacing="-3"
    fill="url(#wordmark)"
  >Conduit</text>

  <!-- Tagline -->
  <text
    x="622" y="340"
    font-family="system-ui, -apple-system, 'Segoe UI', sans-serif"
    font-size="26"
    font-weight="400"
    letter-spacing="0.5"
    fill="#475569"
  >Process orchestration without the JVM</text>

  <!-- Pills / badges -->
  <rect x="622" y="378" width="86" height="30" rx="15" fill="#1e3a5f" stroke="#3a5068" stroke-width="1"/>
  <text x="665" y="398" font-family="system-ui, sans-serif" font-size="13" font-weight="500" fill="#7dd3fc" text-anchor="middle">BPMN 2.0</text>

  <rect x="718" y="378" width="66" height="30" rx="15" fill="#1e3a5f" stroke="#3a5068" stroke-width="1"/>
  <text x="751" y="398" font-family="system-ui, sans-serif" font-size="13" font-weight="500" fill="#7dd3fc" text-anchor="middle">DMN</text>

  <rect x="794" y="378" width="60" height="30" rx="15" fill="#1e3a5f" stroke="#3a5068" stroke-width="1"/>
  <text x="824" y="398" font-family="system-ui, sans-serif" font-size="13" font-weight="500" fill="#7dd3fc" text-anchor="middle">Rust</text>

  <rect x="864" y="378" width="104" height="30" rx="15" fill="#1e3a5f" stroke="#3a5068" stroke-width="1"/>
  <text x="916" y="398" font-family="system-ui, sans-serif" font-size="13" font-weight="500" fill="#7dd3fc" text-anchor="middle">PostgreSQL</text>
</svg>
